<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Estante Infinita</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="ec-create-account-page">

        <button
            type="button"
            class="ec-create-account-back-btn"
            onclick="history.back()"
            aria-label="Voltar">
            ←
        </button>

        <section class="ec-create-account-container">

            <div class="ec-create-account-avatar">

                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="currentColor">

                    <path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5
                             2.24-5 5 2.24 5 5 5zm0 2c-3.33
                             0-10 1.67-10 5v3h20v-3c0-3.33-6.67-5-10-5z"/>
                </svg>

            </div>

            <form
                class="ec-create-account-form"
                action="#"
                method="post">

                <div class="ec-create-account-field">

                    <label for="ec-fullname">
                        Nome Completo
                    </label>

                    <input
                        type="text"
                        id="ec-fullname"
                        name="fullname"
                        autocomplete="name"
                        required>

                </div>

                <div class="ec-create-account-field">

                    <label for="ec-email">
                        Email
                    </label>

                    <input
                        type="email"
                        id="ec-email"
                        name="email"
                        autocomplete="email"
                        required>

                </div>

                <div class="ec-create-account-field">

                    <label for="ec-password">
                        Senha
                    </label>

                    <input
                        type="password"
                        id="ec-password"
                        name="password"
                        autocomplete="new-password"
                        required>

                </div>

                <div class="ec-create-account-field">

                    <label for="ec-city">
                        Cidade
                    </label>

                    <input
                        type="text"
                        id="ec-city"
                        name="city"
                        autocomplete="address-level2"
                        required>

                </div>

                <div class="ec-create-account-checkbox-group">

                    <label class="ec-create-account-checkbox">

                        <input
                            type="checkbox"
                            name="newsletter">

                        <span>
                            Aceito receber as novidades do site
                        </span>

                    </label>

                </div>

                <div class="ec-create-account-checkbox-group">

                    <label class="ec-create-account-checkbox">

                        <input
                            type="checkbox"
                            name="terms"
                            required>

                        <span>
                            Estou de acordo com os termos de serviço e
                            a política de privacidade da Estante Infinita
                        </span>

                    </label>

                </div>

                <button
                    type="submit"
                    class="ec-create-account-submit">

                    Criar Conta

                </button>

            </form>

        </section>

    </main>

</body>

</html>
