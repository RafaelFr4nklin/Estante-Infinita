<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Estante Infinita</title>
    <link rel="stylesheet" href="CSS/cadastro.css">
</head>

<body>

    <main class="create-account-page">

        <button type="button" class="create-account-back-btn" onclick="history.back()">
            <img id="seta" src="img/seta.png" alt="">
        </button>

        <section class="create-account-container">

            <div class="create-account-avatar">
                <img id="person" src="img/person.png" alt="">
            </div>

            <form
                id="create-account-form"
                class="create-account-form">

                <div class="estilo-vidro">
                    <label for="fullname">Nome Completo</label>
                    <input
                        type="text"
                        id="fullname"
                        name="fullname"
                        autocomplete="name"
                        required>
                </div>

                <div class="estilo-vidro">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        autocomplete="email"
                        required>
                </div>

                <div class="estilo-vidro">
                    <label for="password">Senha</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        autocomplete="new-password"
                        required>
                </div>

                <div class="estilo-vidro">
                    <label for="city">Cidade</label>
                    <input
                        type="text"
                        id="city"
                        name="city"
                        autocomplete="address-level2"
                        required>
                </div>

                <div class="create-account-checkbox-group">
                    <label class="create-account-checkbox">
                        <input
                            type="checkbox"
                            name="newsletter">
                            Aceito receber as novidades do site
                </div>

                <div class="create-account-checkbox-group">
                    <label class="create-account-checkbox">
                        <input
                            type="checkbox"
                            id="terms"
                            required>
                            Estou de acordo com os termos de serviço e a política de privacidade da Estante Infinita
                    </label>
                </div>

                <button
                    type="submit"
                    class="create-account-submit">
                    Criar Conta
                </button>

            </form>

            <div
                id="success-message"
                class="success-message">
                Conta criada com sucesso! Redirecionando para o login...
            </div>

        </section>

    </main>

    <script>

        document.addEventListener("DOMContentLoaded", () => {

            const form = document.getElementById("create-account-form");
            const successMessage = document.getElementById("success-message");

            form.addEventListener("submit", (event) => {

                event.preventDefault();

                const nome = document.getElementById("fullname").value.trim();
                const email = document.getElementById("email").value.trim();
                const senha = document.getElementById("password").value.trim();
                const cidade = document.getElementById("city").value.trim();

                if (!nome || !email || !senha || !cidade) {
                    alert("Preencha todos os campos.");
                    return;
                }

                const usuario = {
                    nome,
                    email,
                    cidade
                };

                localStorage.setItem(
                    "usuarioEstanteInfinita",
                    JSON.stringify(usuario)
                );

                successMessage.classList.add("show");

                setTimeout(() => {
                    window.location.href = "login.html";
                }, 2500);

            });

        });

    </script>

</body>

</html>
