<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta nome="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Estante Infinita</title>
    <link rel="stylesheet" href="CSS/cadastro.css">
</head>

<body>

    <main class="criacao-conta-page">

        <button type="button" class="criacao-conta-back-btn" onclick="history.back()">
            <img id="seta" src="img/seta.png" alt="">
        </button>

        <section class="criacao-container">

            <div class="avatar">
                <img id="person" src="img/person.png" alt="">
            </div>

            <form
                id="criacao-conta"
                class="criacao-conta">

                <div class="estilo-vidro">
                    <label for="nome-completo">Nome Completo</label>
                    <input
                        type="texto"
                        id="nome-completo"
                        nome="nome-completo"
                        autocomplete="nome"
                        required>
                </div>

                <div class="estilo-vidro">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        nome="email"
                        autocomplete="email"
                        required>
                </div>

                <div class="estilo-vidro">
                    <label for="senha">Senha</label>
                    <input
                        type="senha"
                        id="senha"
                        nome="senha"
                        autocomplete="nova-senha"
                        required>
                </div>

                <div class="estilo-vidro">
                    <label for="cidade">Cidade</label>
                    <input
                        type="texto"
                        id="cidade"
                        nome="cidade"
                        autocomplete="address-level2"
                        required>
                </div>

                <div class="grupo-criar-conta">
                    <label class="criar-conta">
                        <input
                            type="checkbox"
                            nome="newsletter">
                            Aceito receber as novidades do site
                </div>

                <div class="grupo-criar-conta">
                    <label class="criar-conta">
                        <input
                            type="checkbox"
                            id="terms"
                            required>
                            Estou de acordo com os termos de serviço e a política de privacidade da Estante Infinita
                    </label>
                </div>

                <button
                    type="submit"
                    class="criacao-conta-submit">
                    Criar Conta
                </button>

            </form>

            <div
                id="msg-sucesso"
                class="msg-sucesso">
                Conta criada com sucesso! Redirecionando para o login...
            </div>

        </section>

    </main>

    <script>

        document.addEventListener("DOMContentLoaded", () => {

            const form = document.getElementById("criacao-conta");
            const successMessage = document.getElementById("msg-sucesso");

            form.addEventListener("submit", (event) => {

                event.preventDefault();

                const nome = document.getElementById("nome-completo").value.trim();
                const email = document.getElementById("email").value.trim();
                const senha = document.getElementById("senha").value.trim();
                const cidade = document.getElementById("cidade").value.trim();

                if (!nome || !email || !senha || !cidade) {
                    alert("Preencha todos os campos.");
                    return;
                }

                const usuario = {
                    nome,
                    email,
                    cidade
                };

                localStorage.setItem(
                    "usuarioEstanteInfinita",
                    JSON.stringify(usuario)
                );

                successMessage.classList.add("show");

                setTimeout(() => {
                    window.location.href = "login.html";
                }, 2500);

            });

        });

    </script>

</body>

</html>
