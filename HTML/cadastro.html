<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Estante Infinita</title>
    <link rel="stylesheet" href="../CSS/cadastro.css">
    <script href="../JS/cadastro.js"></script>
</head>

<body>

    <main class="criacao-conta-page">

        <button type="button" class="criacao-conta-back-btn" onclick="history.back()">
            <img id="seta" src="../img/seta.png" alt="">
        </button>

        <section class="criacao-container">

            <div class="avatar">
                <img id="pessoa120" src="../img/pessoa120.png" alt="">
            </div>

            <form
                id="criacao-conta"
                class="criacao-conta">

                <div class="estilo-vidro">
                    <label for="nome-completo">Nome Completo</label>
                    <input
                        type="texto"
                        id="nome-completo"
                        nome="nome-completo"
                        autocomplete="nome"
                        required>
                </div>

                <div class="estilo-vidro">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        nome="email"
                        autocomplete="email"
                        required>
                </div>

                <div class="estilo-vidro">
                    <label for="senha">Senha</label>
                    <input
                        type="senha"
                        id="senha"
                        nome="senha"
                        autocomplete="nova-senha"
                        required>
                </div>

                <div class="estilo-vidro">
                    <label for="cidade">Cidade</label>
                    <input
                        type="texto"
                        id="cidade"
                        nome="cidade"
                        autocomplete="address-level2"
                        required>
                </div>

                <div class="grupo-criar-conta">
                    <label class="criar-conta">
                        <input
                            type="checkbox"
                            nome="newsletter">
                            Aceito receber as novidades do site
                </div>

                <div class="grupo-criar-conta">
                    <label class="criar-conta">
                        <input
                            type="checkbox"
                            id="terms"
                            required>
                            Estou de acordo com os termos de serviço e a política de privacidade da Estante Infinita
                    </label>
                </div>

                <button
                href="../HTML/tela_entrar.html"
                    type="submit"
                    class="criacao-conta-submit">
                    Criar Conta
                </button>

            </form>

            <div
                id="msg-sucesso"
                class="msg-sucesso">
                Conta criada com sucesso! Redirecionando para o login...
            </div>

        </section>

    </main>

</body>

</html>
