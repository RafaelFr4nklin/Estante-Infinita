<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Estante Infinita</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <header>
        <!--======|CABEÇALHO DO SITE|======-->
        <button name="voltar"> <img id="seta" src="img/seta.png" alt=""></button>
        <br><br>
        <img id="logo" src="img/logo.png" alt="">

    </header>
    <main>

        <form id="formCadastro"> 

            <section class="efeito-vidro">
                <label for="nome">Nome</label> 
                <input class="efeito-vidro" type="text" id="nome" required minlength="3" > 
            </section>

            <section class="efeito-vidro">
                <label for="email">Email</label>
                <input class="efeito-vidro" type="text" id="email" pattern=".+@gmail.com" required>
            </section>

            <button class="efeito-vidro" id="enviar" type="submit">Entrar</button>
        </form>

        <h3> ou </h3>

        <form id="formRedesSociais"> 
            <button class="efeito-vidro" onclick="history.back()">Continuar pelo google</button>
            <button class="efeito-vidro" onclick="history.back()">Continuar pelo facebook</button>
        </form>
    </main>
    <footer>
        <br>
        <text>Já é cadastrado?</text>
        <button class="texto-botao" onclick="history.back()">Crie</button>
    </footer>
</body>
</html>
