<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estante Infinita</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>

<!-- ======| HEADER |====== -->
<header>
    <div class="logo-circle">
        <span class="logo-text">∞<br><small>ESTANTE<br>INFINITA</small></span>
    </div>
    <div class="header-icons">
        <button class="icon-btn" aria-label="Minha conta">
            <svg width="24" height="24" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
        </button>
        <button class="icon-btn" aria-label="Carrinho">
            <svg width="24" height="24" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
                <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                <line x1="3" y1="6" x2="21" y2="6"/>
                <path d="M16 10a4 4 0 01-8 0"/>
            </svg>
        </button>
    </div>
</header>



<!-- ======| MAIN |====== -->
<main>

    <!-- CARTAS -->
    <section class="categoria">
        <div class="categoria-titulo"><span>Cartas</span></div>
        <div class="cards-scroll">

            <div class="card-item">
                <div class="card-img" style="background:linear-gradient(135deg,#0d0d1a,#1a1a3e,#6a0572,#e94560);">🐸</div>
                <p class="card-nome">Bulbasaur BASIC</p>
                <div class="estrelas">★★★★★</div>
                <p class="card-preco">R$ 00,00</p>
            </div>

            <div class="card-item">
                <div class="card-img" style="background:linear-gradient(135deg,#ffe066,#f5a623,#fff176);">⭐</div>
                <p class="card-nome">Jirachi BASIC</p>
                <div class="estrelas">★★★★★</div>
                <p class="card-preco">R$ 34,50</p>
            </div>

            <div class="card-item">
                <div class="card-img" style="background:linear-gradient(135deg,#ddd,#aaa,#eee);">🐱</div>
                <p class="card-nome">Meowth EX</p>
                <div class="estrelas">★★★★★</div>
                <p class="card-preco">R$ 91,00</p>
            </div>

            <div class="card-item">
                <div class="card-img" style="background:linear-gradient(135deg,#ff6f00,#ffca28,#ef6c00);">🦎</div>
                <p class="card-nome">Charmander BASIC</p>
                <div class="estrelas">★★★★★</div>
                <p class="card-preco">R$ 21,50</p>
            </div>

            <div class="card-item">
                <div class="card-img" style="background:linear-gradient(135deg,#4fc3f7,#ce93d8,#a5d6a7);">🐉</div>
                <p class="card-nome">Zygarde GX</p>
                <div class="estrelas">★★★★★</div>
                <p class="card-preco">R$ 00,00</p>
            </div>

        </div>
        <div class="linha-secao"></div>
    </section>

    <!-- QUADRINHOS -->
    <section class="categoria">

    </section>

</main>

<!-- ======| FOOTER |====== -->
<footer>


</footer>

</body>
</html>
