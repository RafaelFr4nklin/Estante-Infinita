<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho - Estante Infinita</title>
    <link rel="stylesheet" href="../CSS/carrinho.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<header>
    <img src="../img/logo.png" alt="Logo Estante Infinita" id="logo">
    <div class="posicao">
    <a href="../HTML/index.html" class="voltar">
        <i class="fa-solid fa-arrow-left"></i>
    </a>
    <h1>Carrinho</h1>
    </div>

    
</header>

<div class="endereco">
    <i class="fa-solid fa-location-dot"></i>
    <p>Rua dos palmares, 789</p>
</div>

<hr class="linha">

<main>
    <div class="aviso-carrinho" id="aviso-carrinho-vazio">
        Não há itens no carrinho
    </div>

    <button class="adicionar">
        Adicionar mais itens
        <i class="fa-regular fa-square-plus"></i>
    </button>
</main>

<section class="resumo">
    <div class="frete">
        <strong>Frete</strong>
        <strong>R$ 00.00</strong>
    </div>

    <div class="total">
        <h2>Total</h2>
        <h2>R$ 00.00</h2>
    </div>

    <button class="comprar">Comprar</button>
</section>

<!-- RODAPÉ -->
    <footer>

        <img src="../img/logo.png" alt="Logo Estante Infinita" width="150">

        <nav class="footer-menu">
            <ul>
                <li><a href="#">* Minha Conta</a></li>
                <li><a href="#">* Meu Carrinho</a></li>
                <li><a href="../HTML/index.html">* Início</a></li>
                <li><a href="#">* Cartas</a></li>
                <li><a href="#">* Quadrinhos</a></li>
            </ul>
        </nav>

        <div class="redes">
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
        </div>

    </footer>
</body>
</html>
